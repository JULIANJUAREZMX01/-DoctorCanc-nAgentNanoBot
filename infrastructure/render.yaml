services:
  - type: web
    name: doctor-cancun-agent
    runtime: python
    buildCommand: pip install poetry && poetry install
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_OWNER_ID
        sync: false
