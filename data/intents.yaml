# ============================================================
# DoctorCancúnAgentNanoBot — Intent Patterns
# ============================================================
# Each intent has a list of trigger patterns (substrings).
# The intent router scores matches by count and pattern length.

intents:
  greeting:
    patterns:
      - "hola"
      - "buenas"
      - "buen dia"
      - "buenos dias"
      - "buenas tardes"
      - "buenas noches"
      - "hey"
      - "oigan"
      - "que tal"
      - "saludos"

  location:
    patterns:
      - "donde estan"
      - "donde están"
      - "ubicacion"
      - "ubicación"
      - "direccion"
      - "dirección"
      - "como llego"
      - "cómo llego"
      - "maps"
      - "mapa"
      - "google maps"

  hours:
    patterns:
      - "horario"
      - "a que hora"
      - "a qué hora"
      - "abren"
      - "cierran"
      - "abiertos"
      - "abierto"
      - "estan abiertos"
      - "ahorita estan"
      - "trabajan hoy"
      - "abren domingos"
      - "dias festivos"

  price_screen:
    patterns:
      - "pantalla"
      - "display"
      - "pantaya"
      - "pantaia"
      - "screen"
      - "cambio de pantalla"
      - "cambiar pantalla"
      - "pantalla rota"
      - "se rompio la pantalla"
      - "cristal roto"

  price_battery:
    patterns:
      - "bateria"
      - "batería"
      - "pila"
      - "no dura la bateria"
      - "se apaga solo"
      - "battery"
      - "cambio de bateria"

  price_charging:
    patterns:
      - "puerto de carga"
      - "centro de carga"
      - "no carga"
      - "no le carga"
      - "cargador"
      - "charging"
      - "no me carga"

  water_damage:
    patterns:
      - "se mojo"
      - "se mojó"
      - "cayo al agua"
      - "cayó al agua"
      - "se le metio agua"
      - "mojado"
      - "water"
      - "wet"
      - "en el agua"
      - "al mar"
      - "a la alberca"

  unlock:
    patterns:
      - "desbloquear"
      - "desbloqueo"
      - "liberar"
      - "liberacion"
      - "liberación"
      - "icloud"
      - "cuenta google"
      - "frp"
      - "bloqueado"
      - "no puedo entrar"
      - "se bloqueo"

  diagnosis:
    patterns:
      - "no enciende"
      - "no prende"
      - "pantalla negra"
      - "lento"
      - "muy lento"
      - "se calienta"
      - "manchas"
      - "lineas en la pantalla"
      - "líneas"
      - "touch no funciona"
      - "no responde el touch"
      - "se congela"
      - "se reinicia solo"
      - "no sirve"
      - "falla"
      - "problema"

  repair_decision:
    patterns:
      - "conviene reparar"
      - "vale la pena"
      - "mejor compro otro"
      - "reparar o comprar"
      - "me conviene"
      - "sera que vale la pena"

  warranty:
    patterns:
      - "garantia"
      - "garantía"
      - "reclamo"
      - "queja"
      - "no quedo bien"
      - "no quedó bien"
      - "sigue fallando"
      - "volvio a fallar"

  payment:
    patterns:
      - "formas de pago"
      - "aceptan tarjeta"
      - "tarjeta de credito"
      - "efectivo"
      - "transferencia"
      - "oxxo"
      - "meses sin intereses"
      - "como puedo pagar"
      - "mercado pago"

  tablet:
    patterns:
      - "ipad"
      - "tablet"
      - "tableta"
      - "tab samsung"

  laptop:
    patterns:
      - "laptop"
      - "computadora"
      - "compu"
      - "notebook"
      - "macbook"
      - "pc"
      - "lap"

  accessories:
    patterns:
      - "mica"
      - "funda"
      - "vidrio templado"
      - "cristal templado"
      - "cargador"
      - "audifonos"
      - "audífonos"
      - "cable"
      - "accesorios"

  appointment:
    patterns:
      - "cita"
      - "agendar"
      - "hacer cita"
      - "puedo ir"
      - "a que hora puedo ir"
      - "tienen espacio"
      - "necesito cita"
      - "puedo pasar"

  domicilio:
