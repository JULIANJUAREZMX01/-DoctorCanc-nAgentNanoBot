      - "domicilio"
      - "a mi casa"
      - "recoger"
      - "envio"
      - "envío"
      - "pueden venir"
      - "servicio a domicilio"

  english:
    patterns:
      - "hello"
      - "hi there"
      - "good morning"
      - "good afternoon"
      - "how much"
      - "do you repair"
      - "can you fix"
      - "broken phone"
      - "screen repair"
      - "english please"
